<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>aozora-proof — 青空文庫記法テキストの文字レベル校正</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header>
      <h1>aozora-proof</h1>
      <p>
        青空文庫記法テキストの<strong>文字レベル校正</strong>をブラウザで。
        JIS X 0208 適合・機種依存文字・旧字体/新字体・外字注記の指摘を、
        貼り付けと同時に表示します（すべてローカルの WebAssembly で実行）。
      </p>
    </header>

    <main>
      <section id="check">
        <h2>校正</h2>
        <textarea
          id="input"
          spellcheck="false"
          placeholder="ここに青空文庫記法のテキストを貼り付け / 入力…"
        >①俱來髙</textarea>
        <ul id="findings" aria-live="polite"></ul>
      </section>

      <section id="gaiji">
        <h2>外字検索</h2>
        <input
          id="gaiji-query"
          type="search"
          placeholder="注記の説明文を検索（例: 尓－小）"
        />
        <ul id="gaiji-results"></ul>
      </section>
    </main>

    <footer>
      <a href="https://github.com/P4suta/aozora-proof">GitHub</a> ·
      <a href="./api/">API ドキュメント</a> · Apache-2.0 OR MIT
    </footer>

    <script type="module" src="./app.js"></script>
  </body>
</html>
