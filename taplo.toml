# TOML formatting + lint (taplo). Run: `taplo fmt`, `taplo lint`.
exclude = ["target/**", "web/pkg/**", "Cargo.lock"]

[formatting]
align_entries       = true
align_comments      = true
array_auto_collapse = true
array_auto_expand   = true
compact_arrays      = true
column_width        = 120
indent_string       = "    "
reorder_keys        = false
reorder_arrays      = false
allowed_blank_lines = 1
