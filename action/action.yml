name: "Aozora Proof"
description: "Check 青空文庫記法 (Aozora Bunko notation) text files for character-level conformance, with SARIF upload to the Security tab."
author: "aozora-proof contributors"
branding:
  icon: "check-circle"
  color: "blue"

inputs:
  files:
    description: "Space-separated files / globs to check (bash globstar is enabled)."
    required: false
    default: "**/*.txt"
  fail-on:
    description: "Fail the job on findings at or above this severity (error | warning | note)."
    required: false
    default: "error"
  upload-sarif:
    description: "Upload results to the Security tab (needs `security-events: write`)."
    required: false
    default: "true"
  version:
    description: "Release tag to install (e.g. v0.1.0), or 'latest'."
    required: false
    default: "latest"

runs:
  using: "composite"
  steps:
    - name: Install aozora-proof (prebuilt, source fallback)
      shell: bash
      env:
        VERSION: ${{ inputs.version }}
      run: |
        set -euo pipefail
        base="https://github.com/P4suta/aozora-proof/releases"
        if [ "$VERSION" = "latest" ]; then
          url="$base/latest/download/aozora-proof-cli-installer.sh"
        else
          url="$base/download/$VERSION/aozora-proof-cli-installer.sh"
        fi
        if curl --proto '=https' --tlsv1.2 -fLsS "$url" -o "$RUNNER_TEMP/install.sh"; then
          sh "$RUNNER_TEMP/install.sh"
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
        else
          echo "::warning::No prebuilt release at $url — building from source (slow). Cut a release to speed this up."
          cargo install --locked --git https://github.com/P4suta/aozora-proof.git aozora-proof-cli
        fi
    - name: Check
      id: check
      shell: bash
      run: |
        set +e
        shopt -s globstar nullglob
        # shellcheck disable=SC2086
        files=( ${{ inputs.files }} )
        sarif="$RUNNER_TEMP/aozora-proof.sarif"
        if [ ${#files[@]} -eq 0 ]; then
          echo "aozora-proof: no files matched '${{ inputs.files }}'"
          printf '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"aozora-proof"}},"results":[]}]}' > "$sarif"
          echo "exit_code=0" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        aozora-proof check "${files[@]}" --format sarif --fail-on "${{ inputs.fail-on }}" > "$sarif"
        echo "exit_code=$?" >> "$GITHUB_OUTPUT"
    - name: Upload SARIF
      if: ${{ inputs.upload-sarif == 'true' }}
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: ${{ runner.temp }}/aozora-proof.sarif
    - name: Enforce threshold
      shell: bash
      run: exit ${{ steps.check.outputs.exit_code }}
