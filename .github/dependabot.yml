version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "02:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 20
    groups:
      rust-deps:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    # `dtolnay/rust-toolchain@<version>` uses the `@version` as the *toolchain*
    # selector, not an action release tag — Dependabot would otherwise "bump"
    # it to a nonexistent Rust version. The toolchain is pinned manually.
    ignore:
      - dependency-name: "dtolnay/rust-toolchain"
    groups:
      actions:
        patterns: ["*"]
