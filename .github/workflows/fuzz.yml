name: fuzz

on:
  schedule:
    - cron: "37 4 * * 1" # Mondays, 04:37 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: fuzz-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fuzz:
    name: fuzz
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [run_all, gaiji]
    steps:
      - uses: actions/checkout@v6
      # cargo-fuzz / libFuzzer need nightly; the `fuzz/` crate is detached from
      # the pinned-stable workspace, so this toolchain is local to this job.
      - uses: dtolnay/rust-toolchain@nightly
      - uses: rui314/setup-mold@v1
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: fuzz
      - name: Install cargo-fuzz
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz
      - name: Fuzz ${{ matrix.target }}
        run: cargo fuzz run ${{ matrix.target }} -- -max_total_time=120
      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-artifacts-${{ matrix.target }}
          path: fuzz/artifacts
          if-no-files-found: ignore
