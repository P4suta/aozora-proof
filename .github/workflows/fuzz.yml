name: fuzz

on:
  schedule:
    - cron: "37 4 * * 1" # Mondays, 04:37 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: fuzz-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fuzz:
    name: fuzz
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [run_all, gaiji]
    steps:
      - uses: actions/checkout@v7
      # cargo-fuzz / libFuzzer need nightly; the `fuzz/` crate is detached from
      # the pinned-stable workspace, so this toolchain is local to this job.
      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: x86_64-unknown-linux-gnu
      - uses: rui314/setup-mold@v1
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: fuzz
      - name: Install cargo-fuzz
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz
      - name: Fuzz ${{ matrix.target }}
        # `+nightly`: rust-toolchain.toml pins stable 1.95.0 tree-wide, and
        # cargo-fuzz needs nightly for the libFuzzer `-Z`/sanitizer flags.
        # `--target …-gnu`: cargo-fuzz's host default resolved to a static-musl
        # target on the runner, which the address sanitizer rejects; pin the
        # dynamic-libc gnu target explicitly.
        run: cargo +nightly fuzz run ${{ matrix.target }} --target x86_64-unknown-linux-gnu -- -max_total_time=120
      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: fuzz-artifacts-${{ matrix.target }}
          path: fuzz/artifacts
          if-no-files-found: ignore
