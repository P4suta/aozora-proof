name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-rust
        with:
          tools: cargo-nextest@0.9
      - run: cargo nextest run --workspace --all-targets
      - run: cargo test --workspace --doc

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-rust
        with:
          components: rustfmt, clippy
      - name: fmt
        run: cargo fmt --all -- --check
      - name: clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: doc
        run: cargo doc --workspace --no-deps --document-private-items
        env:
          RUSTDOCFLAGS: "-D warnings"
      - name: typos
        uses: crate-ci/typos@master
      - name: lint tools
        uses: taiki-e/install-action@v2
        with:
          tool: taplo@0.10.0, shellcheck@0.11.0, biome@2.5.0
      - name: install actionlint
        # actionlint is not in install-action's manifest; fetch the pinned binary.
        run: |
          curl -fsSL https://github.com/rhysd/actionlint/releases/download/v1.7.12/actionlint_1.7.12_linux_amd64.tar.gz \
            | tar -xz -C "$RUNNER_TEMP" actionlint
          echo "$RUNNER_TEMP" >> "$GITHUB_PATH"
      - name: taplo
        run: taplo fmt --check && taplo lint
      - name: actionlint
        run: actionlint
      - name: biome
        run: biome ci web

  deny:
    name: deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-rust
        with:
          components: llvm-tools-preview
          tools: cargo-llvm-cov@0.8
      - run: cargo llvm-cov --workspace --summary-only
