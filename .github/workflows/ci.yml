name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-rust
        with:
          tools: cargo-nextest@0.9
      - run: cargo nextest run --workspace --all-targets
      - run: cargo test --workspace --doc

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-rust
        with:
          components: rustfmt, clippy
      - name: fmt
        run: cargo fmt --all -- --check
      - name: clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: doc
        run: cargo doc --workspace --no-deps --document-private-items
        env:
          RUSTDOCFLAGS: "-D warnings"
      - name: typos
        uses: crate-ci/typos@master
      - name: lint tools
        uses: taiki-e/install-action@v2
        with:
          tool: taplo@0.10.0, shellcheck@0.11.0
      - name: install actionlint
        # actionlint is not in install-action's manifest; fetch the pinned binary.
        run: |
          curl -fsSL https://github.com/rhysd/actionlint/releases/download/v1.7.12/actionlint_1.7.12_linux_amd64.tar.gz \
            | tar -xz -C "$RUNNER_TEMP" actionlint
          echo "$RUNNER_TEMP" >> "$GITHUB_PATH"
      - name: taplo
        run: taplo fmt --check && taplo lint
      - name: actionlint
        run: actionlint

  deny:
    name: deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: EmbarkStudios/cargo-deny-action@v2

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-rust
        with:
          components: llvm-tools-preview
          tools: cargo-llvm-cov@0.8
      - name: Collect coverage (run tests once)
        run: cargo llvm-cov --workspace --no-report
      - name: Report (lcov + HTML + summary)
        run: |
          cargo llvm-cov report --lcov --output-path lcov.info
          cargo llvm-cov report --html
          cargo llvm-cov report --summary-only
      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: |
            lcov.info
            target/llvm-cov/html
          if-no-files-found: error

  web:
    name: web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-rust
        with:
          targets: wasm32-unknown-unknown
          tools: wasm-pack@0.15
      - name: Build wasm package (→ web/src/lib/pkg)
        run: wasm-pack build --target web --release crates/aozora-proof-wasm --out-dir ../../web/src/lib/pkg
      - uses: pnpm/action-setup@v6
        with:
          version: 11
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - name: Install web deps
        run: pnpm install --frozen-lockfile
        working-directory: web
      - name: Lint (prettier + eslint)
        run: pnpm run lint
        working-directory: web
      - name: Type-check (svelte-check)
        run: pnpm run check
        working-directory: web
      - name: Build (prerender)
        run: pnpm run build
        working-directory: web
        env:
          BASE_PATH: /aozora-proof
