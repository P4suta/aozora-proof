name: docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-rust
        with:
          targets: wasm32-unknown-unknown
          tools: wasm-pack@0.15
      - name: Build wasm package (→ web/src/lib/pkg)
        run: wasm-pack build --target web --release crates/aozora-proof-wasm --out-dir ../../web/src/lib/pkg
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - name: Install web deps
        run: pnpm install --frozen-lockfile
        working-directory: web
      - name: Build static site (→ web/build)
        run: pnpm run build
        working-directory: web
        env:
          BASE_PATH: /aozora-proof
      - name: Build rustdoc
        run: cargo doc --workspace --no-deps
        env:
          RUSTDOCFLAGS: "-D warnings"
      - name: Add rustdoc under /api/
        run: |
          mkdir -p web/build/api
          cp -r target/doc/. web/build/api/
          printf '<meta http-equiv="refresh" content="0; url=aozora_proof_core/index.html">' > web/build/api/index.html
      - uses: actions/upload-pages-artifact@v5
        with:
          path: web/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
