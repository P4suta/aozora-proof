name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch: # build-only dry run (no publish)

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: x86_64-unknown-linux-gnu, os: ubuntu-latest }
          - { target: aarch64-apple-darwin, os: macos-latest }
          - { target: x86_64-pc-windows-msvc, os: windows-latest }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p aozora-proof-cli
      - name: Package (unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          name="aozora-proof-${GITHUB_REF_NAME}-${{ matrix.target }}"
          mkdir "$name"
          cp "target/${{ matrix.target }}/release/aozora-proof" "$name"/
          cp LICENSE-APACHE LICENSE-MIT README.md NOTICE "$name"/
          tar czf "$name.tar.gz" "$name"
          sha256sum "$name.tar.gz" > "$name.tar.gz.sha256"
      - name: Package (windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          name="aozora-proof-${GITHUB_REF_NAME}-${{ matrix.target }}"
          mkdir "$name"
          cp "target/${{ matrix.target }}/release/aozora-proof.exe" "$name"/
          cp LICENSE-APACHE LICENSE-MIT README.md NOTICE "$name"/
          7z a "$name.zip" "$name"
          sha256sum "$name.zip" > "$name.zip.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.target }}
          path: |
            aozora-proof-*.tar.gz*
            aozora-proof-*.zip*

  release:
    name: release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: SHA256SUMS
        working-directory: dist
        run: sha256sum aozora-proof-*.tar.gz aozora-proof-*.zip > SHA256SUMS
      - name: Release notes
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: RELEASE_NOTES.md
      - name: Publish
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          files: dist/*
