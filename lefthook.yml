# aozora-proof — strict lefthook hooks (pre-commit / commit-msg / pre-push /
# post-merge / post-checkout). Runs straight on the host (cargo + typos).
#
# Enable after clone:  `lefthook install`
# Disable:             `lefthook uninstall`
#
# Strictness policy:
# - pre-commit is the gentle pass: format-and-restage, deny obvious mistakes.
# - pre-push is the strict gate: no writes; every check that can run locally
#   runs here. If anything fails, the push is blocked.
#
# Reference: https://lefthook.dev/configuration/

pre-commit:
  parallel: true
  skip:
    - rebase
    - merge
  commands:
    rust-fmt:
      glob: "*.rs"
      run: cargo fmt --all
      stage_fixed: true
    rust-clippy:
      glob: "*.{rs,toml}"
      run: cargo clippy --workspace --all-targets -- -D warnings
    typos:
      run: typos
    taplo:
      glob: "*.toml"
      run: command -v taplo >/dev/null 2>&1 && taplo fmt {staged_files} || true
      stage_fixed: true
    web-format:
      root: "web/"
      glob: "*.{js,ts,svelte,css,html,json}"
      run: command -v pnpm >/dev/null 2>&1 && pnpm exec prettier --write {staged_files} || true
      stage_fixed: true
    actionlint:
      glob: ".github/**/*.{yml,yaml}"
      run: command -v actionlint >/dev/null 2>&1 && actionlint || true

commit-msg:
  commands:
    # Conventional Commits — type required, scope optional, breaking-`!` optional.
    conventional:
      run: |
        grep -qE '^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\(.+\))?!?: .{1,}' {1} \
          || { echo 'Commit message must follow Conventional Commits (https://www.conventionalcommits.org/)'; exit 1; }

pre-push:
  parallel: true
  skip:
    - rebase
  commands:
    rust-fmt-check:
      run: cargo fmt --all -- --check
    rust-clippy:
      run: cargo clippy --workspace --all-targets --all-features -- -D warnings
    rust-test:
      run: cargo test --workspace --all-targets
    rust-doc:
      run: cargo doc --workspace --no-deps --document-private-items
      env:
        RUSTDOCFLAGS: "-D warnings"
    typos:
      run: typos
    deny:
      run: command -v cargo-deny >/dev/null && cargo deny --all-features --manifest-path Cargo.toml check || true
    taplo:
      run: if command -v taplo >/dev/null 2>&1; then taplo fmt --check && taplo lint; fi
    web:
      root: "web/"
      run: |
        if command -v pnpm >/dev/null 2>&1 && command -v wasm-pack >/dev/null 2>&1; then
          wasm-pack build --target web --release ../crates/aozora-proof-wasm --out-dir src/lib/pkg
          pnpm install --frozen-lockfile && pnpm run lint && pnpm run check
        fi
    actionlint:
      run: if command -v actionlint >/dev/null 2>&1; then actionlint; fi

# After pull / merge / checkout, warm the dependency cache (informational).
post-merge:
  commands:
    cargo-fetch-warm:
      glob: "{Cargo.toml,Cargo.lock,crates/*/Cargo.toml}"
      run: cargo fetch --quiet || true

post-checkout:
  commands:
    cargo-fetch-warm:
      glob: "{Cargo.toml,Cargo.lock,crates/*/Cargo.toml}"
      run: cargo fetch --quiet || true
