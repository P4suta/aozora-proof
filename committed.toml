# `committed` (https://github.com/crate-ci/committed) — Conventional
# Commits linter run by the commit-msg lefthook hook and by CI on PR
# titles. Supersedes the previous hand-rolled grep check.
#
# Schema: `committed --dump-config -` prints the active configuration.

style = "conventional"

# Subjects: lowercase first char, imperative voice, no trailing
# punctuation (`fix: add feature`, not `Fix: Added the feature.`).
subject_capitalized    = false
subject_not_punctuated = true
imperative_subject     = true

# 50/72 — the Linux-kernel rule for legible `git log --oneline`.
subject_length   = 50
line_length      = 72
hard_line_length = 0

# WIP / fixup commits belong on the work-tree, not in merged history.
no_fixup = true
no_wip   = true

# Squash merges look like merges to committed but their subject is the PR
# title, which we want linted.
merge_commit = true

allowed_types  = ["feat", "fix", "docs", "style", "refactor", "perf", "test", "build", "ci", "chore", "revert"]
allowed_scopes = []
